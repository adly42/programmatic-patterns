<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gyroid</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #080508;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 16px;
  gap: 14px;
  overflow-y: auto;
}

canvas {
  display: block;
  border-radius: 8px;
  width: min(calc(100vw - 32px), calc((100vh - 220px) * 16 / 9));
  aspect-ratio: 16 / 9;
  flex-shrink: 0;
}

.panel {
  background: rgba(255,255,255,0.055);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 14px;
  padding: 13px 16px;
  width: min(calc(100vw - 32px), 640px);
  display: flex;
  flex-direction: column;
  gap: 9px;
}

.row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.lbl {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  width: 72px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

input[type=range] {
  flex: 1;
  accent-color: rgba(255,255,255,0.55);
  cursor: pointer;
  height: 3px;
}

.val {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  font-variant-numeric: tabular-nums;
  min-width: 30px;
  text-align: right;
}

.btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 1px;
}

.btns button {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.09);
  color: rgba(255,255,255,0.65);
  padding: 5px 13px;
  border-radius: 7px;
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.12s;
}

.btns button:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.9); }
.btns button.rec   { background: #ff3b30; border-color: #ff3b30; color: #fff; }

input[type=color] {
  -webkit-appearance: none;
  appearance: none;
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 7px;
  padding: 2px;
  cursor: pointer;
  background: none;
  flex-shrink: 0;
}
input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
input[type=color]::-webkit-color-swatch {
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 6px;
}

.top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}

.title {
  font-size: 11px;
  color: rgba(255,255,255,0.28);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.hr { height: 1px; background: rgba(255,255,255,0.07); margin: 1px 0; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="panel">
  <div class="top-row">
    <span class="title">Gyroid</span>
  </div>

  <div class="hr"></div>

  <div class="row">
    <span class="lbl">Surface</span>
    <input type="color" id="cA" value="#7fd4c8">
    <span class="lbl" style="width:auto;padding-left:10px">Background</span>
    <input type="color" id="cB" value="#150a28">
  </div>

  <div class="row">
    <span class="lbl">Scale</span>
    <input type="range" id="sScale" min="5" max="30" value="15" step="1">
    <span class="val" id="vScale">15</span>
  </div>
  <div class="row">
    <span class="lbl">Thickness</span>
    <input type="range" id="sThick" min="1" max="15" value="8" step="1">
    <span class="val" id="vThick">8</span>
  </div>
  <div class="row">
    <span class="lbl">Glow</span>
    <input type="range" id="sGlow" min="0" max="100" value="25" step="1">
    <span class="val" id="vGlow">25</span>
  </div>
  <div class="row">
    <span class="lbl">Speed</span>
    <input type="range" id="sSpeed" min="0" max="2" value="0.5" step="0.05">
    <span class="val" id="vSpeed">0.50</span>
  </div>

  <div class="hr"></div>

  <div class="btns">
    <button id="btnPlay" onclick="togglePlay()">⏸ Pause</button>
    <button onclick="savePng()">↓ PNG</button>
    <button id="btnRec" onclick="toggleRecord()">⏺ Record</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { preserveDrawingBuffer: true });
if (!gl) {
  document.body.innerHTML = '<p style="color:#fff;padding:40px;font-family:sans-serif">WebGL2 is required.</p>';
}

let playing = true, elapsed = 0, lastTs = null;

function hexToRgb(hex) {
  return [
    parseInt(hex.slice(1,3),16)/255,
    parseInt(hex.slice(3,5),16)/255,
    parseInt(hex.slice(5,7),16)/255
  ];
}

const DPR = Math.min(devicePixelRatio, 2);
canvas.width  = 1280;
canvas.height = 720;
gl.viewport(0, 0, 1280, 720);

function resizeCanvas() {
  const w = Math.round(canvas.clientWidth  * DPR);
  const h = Math.round(canvas.clientHeight * DPR);
  if (w > 0 && h > 0 && (canvas.width !== w || canvas.height !== h)) {
    canvas.width  = w;
    canvas.height = h;
    gl.viewport(0, 0, w, h);
  }
}
new ResizeObserver(resizeCanvas).observe(canvas);
resizeCanvas();

// ---- Shaders ----
const VS = `#version 300 es
in vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
`;

const FS = `#version 300 es
precision highp float;
out vec4 fragColor;

uniform vec2  uRes;
uniform float uTime;
uniform float uSpeed;
uniform float uScale;
uniform float uThick;
uniform float uGlow;
uniform vec3  uColorA; // surface
uniform vec3  uColorB; // background

// Gyroid SDF: shell where |dot(sin(p*s), cos(p.yzx * s))| < thick
float map(vec3 p) {
  vec3 q = p * uScale;
  return (abs(dot(sin(q), cos(q.yzx))) - uThick) / uScale;
}

// Tetrahedral normal estimation
vec3 calcNormal(vec3 p) {
  vec2 e = vec2(0.0005, -0.0005);
  return normalize(
    e.xyy * map(p + e.xyy) +
    e.yyx * map(p + e.yyx) +
    e.yxy * map(p + e.yxy) +
    e.xxx * map(p + e.xxx)
  );
}

void main() {
  vec2 uv = gl_FragCoord.xy / uRes;

  // Orbiting camera
  float ang = uTime * uSpeed * 0.15;
  vec3 ro = vec3(cos(ang) * 4.0, 1.5 + sin(ang * 0.37) * 1.0, sin(ang) * 4.0);
  vec3 target = vec3(0.0);
  vec3 fwd   = normalize(target - ro);
  vec3 right = normalize(cross(vec3(0.0, 1.0, 0.0), fwd));
  vec3 up    = cross(fwd, right);

  vec2 ndc = (uv - 0.5) * vec2(uRes.x / uRes.y, 1.0) * 1.2;
  vec3 rd = normalize(fwd + right * ndc.x + up * ndc.y);

  // Raymarching
  float t = 0.1;
  bool hit = false;
  vec3 p = ro;
  for (int i = 0; i < 100; i++) {
    p = ro + rd * t;
    float d = map(p);
    if (d < 0.001) { hit = true; break; }
    if (t > 12.0) break;
    t += max(d * 0.35, 0.004);
  }

  vec3 col;
  if (hit) {
    vec3 N = calcNormal(p);

    // Key light and fill light directions
    vec3 L1 = normalize(vec3(1.2, 1.8, 0.8));
    vec3 L2 = normalize(vec3(-0.8, 0.4, -1.2));
    vec3 V  = -rd;

    // Diffuse
    float diff1 = max(0.0, dot(N, L1));
    float diff2 = max(0.0, dot(N, L2)) * 0.35;
    float diff = diff1 + diff2;

    // Blinn-Phong specular (key light only)
    vec3 H = normalize(L1 + V);
    float spec = pow(max(0.0, dot(N, H)), 48.0) * 0.7;

    // Rim light
    float rim = pow(1.0 - max(0.0, dot(N, V)), 3.0) * uGlow;

    vec3 baseCol = uColorA;
    col = baseCol * (0.08 + diff * 0.85) + vec3(spec) + baseCol * rim;

    // Tone map
    col = col / (col + 0.7);
  } else {
    // Background gradient
    vec3 bg = mix(uColorB * 0.3, vec3(0.0), smoothstep(-0.4, 0.4, rd.y));
    col = bg;
  }

  fragColor = vec4(col, 1.0);
}
`;

function mkShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    console.error('Shader error:', gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, mkShader(gl.VERTEX_SHADER,   VS));
gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
  console.error('Link error:', gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const U = {
  res:    gl.getUniformLocation(prog, 'uRes'),
  time:   gl.getUniformLocation(prog, 'uTime'),
  speed:  gl.getUniformLocation(prog, 'uSpeed'),
  scale:  gl.getUniformLocation(prog, 'uScale'),
  thick:  gl.getUniformLocation(prog, 'uThick'),
  glow:   gl.getUniformLocation(prog, 'uGlow'),
  colorA: gl.getUniformLocation(prog, 'uColorA'),
  colorB: gl.getUniformLocation(prog, 'uColorB'),
};

function frame(ts) {
  if (lastTs !== null && playing) elapsed += (ts - lastTs) / 1000;
  lastTs = ts;

  const ca = hexToRgb(document.getElementById('cA').value);
  const cb = hexToRgb(document.getElementById('cB').value);
  const scale = parseFloat(document.getElementById('sScale').value) * 0.1;
  const thick = parseFloat(document.getElementById('sThick').value) * 0.015;
  const speed = parseFloat(document.getElementById('sSpeed').value);
  const glow  = parseFloat(document.getElementById('sGlow').value) * 0.008;

  gl.uniform2f(U.res,   canvas.width, canvas.height);
  gl.uniform1f(U.time,  elapsed);
  gl.uniform1f(U.speed, speed);
  gl.uniform1f(U.scale, scale);
  gl.uniform1f(U.thick, thick);
  gl.uniform1f(U.glow,  glow);
  gl.uniform3f(U.colorA, ca[0], ca[1], ca[2]);
  gl.uniform3f(U.colorB, cb[0], cb[1], cb[2]);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ---- Controls ----
[
  ['sScale', 'vScale', 0],
  ['sThick', 'vThick', 0],
  ['sGlow',  'vGlow',  0],
  ['sSpeed', 'vSpeed', 2],
].forEach(([sid, vid, dp]) => {
  document.getElementById(sid).addEventListener('input', () => {
    document.getElementById(vid).textContent =
      parseFloat(document.getElementById(sid).value).toFixed(dp);
  });
});

function togglePlay() {
  playing = !playing;
  if (playing) lastTs = null;
  document.getElementById('btnPlay').textContent = playing ? '⏸ Pause' : '▶ Play';
}

function savePng() {
  const a = document.createElement('a');
  a.download = 'gyroid.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

let mediaRecorder2 = null, recordChunks2 = [];
function toggleRecord() {
  const btn = document.getElementById('btnRec');
  if (!mediaRecorder2) {
    const mimeType = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm']
      .find(m => MediaRecorder.isTypeSupported(m));
    const stream = canvas.captureStream(30);
    mediaRecorder2 = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8_000_000 });
    recordChunks2 = [];
    mediaRecorder2.ondataavailable = e => { if (e.data.size > 0) recordChunks2.push(e.data); };
    mediaRecorder2.onstop = () => {
      const blob = new Blob(recordChunks2, { type: mimeType });
      const a = document.createElement('a');
      a.download = 'gyroid.webm';
      a.href = URL.createObjectURL(blob);
      a.click();
      URL.revokeObjectURL(a.href);
      mediaRecorder2 = null;
    };
    mediaRecorder2.start();
    btn.textContent = '⏹ Stop';
    btn.classList.add('rec');
    if (!playing) togglePlay();
  } else {
    mediaRecorder2.stop();
    btn.textContent = '⏺ Record';
    btn.classList.remove('rec');
  }
}
</script>

</body>
</html>
