<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lissajous</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0a0a;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 16px;
  gap: 14px;
  overflow-y: auto;
}

canvas {
  display: block;
  border-radius: 8px;
  width: min(calc(100vw - 32px), calc((100vh - 220px) * 16 / 9));
  aspect-ratio: 16 / 9;
  flex-shrink: 0;
}

.panel {
  background: rgba(255,255,255,0.055);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 14px;
  padding: 13px 16px;
  width: min(calc(100vw - 32px), 640px);
  display: flex;
  flex-direction: column;
  gap: 9px;
}

.row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.lbl {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  width: 72px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

input[type=range] {
  flex: 1;
  min-width: 80px;
  accent-color: rgba(255,255,255,0.55);
  cursor: pointer;
  height: 3px;
}

.val {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  font-variant-numeric: tabular-nums;
  min-width: 36px;
  text-align: right;
}

input[type=color] {
  -webkit-appearance: none;
  appearance: none;
  width: 28px;
  height: 28px;
  border: none;
  border-radius: 6px;
  padding: 2px;
  cursor: pointer;
  background: none;
  flex-shrink: 0;
}
input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
input[type=color]::-webkit-color-swatch {
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 5px;
}

.btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 1px;
}

.btns button, .btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.09);
  color: rgba(255,255,255,0.65);
  padding: 5px 13px;
  border-radius: 7px;
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.12s;
}

.btns button:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.9); }
.btns button.rec  { background: #ff3b30; border-color: #ff3b30; color: #fff; }

.top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}

.title {
  font-size: 11px;
  color: rgba(255,255,255,0.28);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.hr { height: 1px; background: rgba(255,255,255,0.07); margin: 1px 0; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="panel">
  <div class="top-row">
    <span class="title">Lissajous</span>
  </div>

  <div class="hr"></div>

  <div class="row">
    <span class="lbl">Color</span>
    <input type="color" id="cColor" value="#00ddff">
  </div>
  <div class="row">
    <span class="lbl">Freq A</span>
    <input type="range" id="sA" min="1" max="12" value="3" step="1">
    <span class="val" id="vA">3</span>
  </div>
  <div class="row">
    <span class="lbl">Freq B</span>
    <input type="range" id="sB" min="1" max="12" value="4" step="1">
    <span class="val" id="vB">4</span>
  </div>
  <div class="row">
    <span class="lbl">Speed</span>
    <input type="range" id="sSpeed" min="0" max="3" value="0.5" step="0.05">
    <span class="val" id="vSpeed">0.50</span>
  </div>
  <div class="row">
    <span class="lbl">Trail</span>
    <input type="range" id="sTrail" min="1" max="10" value="5" step="1">
    <span class="val" id="vTrail">5</span>
  </div>
  <div class="row">
    <span class="lbl">Width</span>
    <input type="range" id="sWidth" min="1" max="10" value="2" step="0.5">
    <span class="val" id="vWidth">2.0</span>
  </div>

  <div class="hr"></div>

  <div class="btns">
    <button id="btnPlay" onclick="togglePlay()">⏸ Pause</button>
    <button onclick="clearCanvas()">Clear</button>
    <button onclick="savePng()">↓ PNG</button>
    <button id="btnRec" onclick="toggleRecord()">⏺ Record</button>
  </div>
</div>

<script>
const W = 1280, H = 720;
const canvas = document.getElementById('c');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

// Start black
ctx.fillStyle = '#000';
ctx.fillRect(0, 0, W, H);

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
function lcm(a, b) { return a * b / gcd(a, b); }

function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

let phase = 0, playing = true, lastTs = null;

function frame(ts) {
  if (lastTs !== null && playing) {
    const fa    = parseInt(document.getElementById('sA').value);
    const fb    = parseInt(document.getElementById('sB').value);
    const speed = parseFloat(document.getElementById('sSpeed').value);
    const trail = parseInt(document.getElementById('sTrail').value);
    const lineW = parseFloat(document.getElementById('sWidth').value);
    const [r, g, b] = hexToRgb(document.getElementById('cColor').value);

    // Fade toward black — slower trail = slower fade = longer persistence
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = `rgba(0,0,0,${0.025 / trail})`;
    ctx.fillRect(0, 0, W, H);

    // Build the Lissajous path for this phase
    const periods = lcm(fa, fb);
    const steps   = Math.min(10000, periods * 300);
    const tMax    = Math.PI * 2 * periods;
    const cx = W / 2, cy = H / 2;
    const rx = W * 0.43, ry = H * 0.43;

    ctx.beginPath();
    for (let i = 0; i <= steps; i++) {
      const t = (i / steps) * tMax;
      const x = cx + rx * Math.sin(fa * t + phase);
      const y = cy + ry * Math.sin(fb * t);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    // Three-pass neon glow: outer halo → mid bloom → bright core
    // All use screen blending so overlapping brightens luminously
    ctx.globalCompositeOperation = 'screen';
    ctx.lineJoin = 'round';
    ctx.lineCap  = 'round';

    ctx.lineWidth = lineW * 12;
    ctx.strokeStyle = `rgba(${r},${g},${b},0.025)`;
    ctx.stroke();

    ctx.lineWidth = lineW * 4;
    ctx.strokeStyle = `rgba(${r},${g},${b},0.10)`;
    ctx.stroke();

    ctx.lineWidth = lineW;
    ctx.strokeStyle = `rgba(${r},${g},${b},0.95)`;
    ctx.stroke();

    ctx.globalCompositeOperation = 'source-over';

    // Advance phase
    phase += speed * 0.01;
  }
  lastTs = ts;
  requestAnimationFrame(frame);
}

// ---- Controls ----
[
  ['sA',     'vA',     0],
  ['sB',     'vB',     0],
  ['sSpeed', 'vSpeed', 2],
  ['sTrail', 'vTrail', 0],
  ['sWidth', 'vWidth', 1],
].forEach(([s, v, dp]) => {
  document.getElementById(s).addEventListener('input', () => {
    document.getElementById(v).textContent =
      parseFloat(document.getElementById(s).value).toFixed(dp);
  });
});

// Clear canvas when frequency changes so the new figure builds cleanly
['sA', 'sB'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    clearCanvas();
    phase = 0;
  });
});

function clearCanvas() {
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
}

function togglePlay() {
  playing = !playing;
  if (playing) lastTs = null;
  document.getElementById('btnPlay').textContent = playing ? '⏸ Pause' : '▶ Play';
}

function savePng() {
  const a = document.createElement('a');
  a.download = 'lissajous.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

let recorder = null, chunks = [];
function toggleRecord() {
  const btn = document.getElementById('btnRec');
  if (!recorder) {
    const mt = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm']
      .find(m => MediaRecorder.isTypeSupported(m));
    recorder = new MediaRecorder(canvas.captureStream(30), { mimeType: mt, videoBitsPerSecond: 8e6 });
    chunks = [];
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
      const a = document.createElement('a');
      a.download = 'lissajous.webm';
      a.href = URL.createObjectURL(new Blob(chunks, { type: mt }));
      a.click(); URL.revokeObjectURL(a.href);
      recorder = null;
    };
    recorder.start();
    btn.textContent = '⏹ Stop'; btn.classList.add('rec');
    if (!playing) togglePlay();
  } else {
    recorder.stop();
    btn.textContent = '⏺ Record'; btn.classList.remove('rec');
  }
}

requestAnimationFrame(frame);
</script>

</body>
</html>
