<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truchet Tiles</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #080508;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 16px;
  gap: 14px;
  overflow-y: auto;
}

canvas {
  display: block;
  border-radius: 8px;
  width: min(calc(100vw - 32px), calc((100vh - 220px) * 16 / 9));
  aspect-ratio: 16 / 9;
  flex-shrink: 0;
}

.panel {
  background: rgba(255,255,255,0.055);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 14px;
  padding: 13px 16px;
  width: min(calc(100vw - 32px), 640px);
  display: flex;
  flex-direction: column;
  gap: 9px;
}

.row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.lbl {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  width: 72px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

input[type=range] {
  flex: 1;
  accent-color: rgba(255,255,255,0.55);
  cursor: pointer;
  height: 3px;
}

.val {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  font-variant-numeric: tabular-nums;
  min-width: 30px;
  text-align: right;
}

.btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 1px;
}

.btns button {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.09);
  color: rgba(255,255,255,0.65);
  padding: 5px 13px;
  border-radius: 7px;
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.12s;
}

.btns button:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.9); }
.btns button.rec   { background: #ff3b30; border-color: #ff3b30; color: #fff; }

input[type=color] {
  -webkit-appearance: none;
  appearance: none;
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 7px;
  padding: 2px;
  cursor: pointer;
  background: none;
  flex-shrink: 0;
}
input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
input[type=color]::-webkit-color-swatch {
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 6px;
}

.top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}

.title {
  font-size: 11px;
  color: rgba(255,255,255,0.28);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.hr { height: 1px; background: rgba(255,255,255,0.07); margin: 1px 0; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="panel">
  <div class="top-row">
    <span class="title">Truchet Tiles</span>
  </div>

  <div class="hr"></div>

  <div class="row">
    <span class="lbl">Line</span>
    <input type="color" id="cA" value="#a8d0f0">
    <span class="lbl" style="width:auto;padding-left:10px">Background</span>
    <input type="color" id="cB" value="#060810">
  </div>

  <div class="row">
    <span class="lbl">Scale</span>
    <input type="range" id="sScale" min="3" max="28" value="12" step="1">
    <span class="val" id="vScale">12</span>
  </div>
  <div class="row">
    <span class="lbl">Thickness</span>
    <input type="range" id="sThick" min="1" max="15" value="5" step="1">
    <span class="val" id="vThick">5</span>
  </div>
  <div class="row">
    <span class="lbl">Speed</span>
    <input type="range" id="sSpeed" min="0" max="3" value="0.6" step="0.05">
    <span class="val" id="vSpeed">0.60</span>
  </div>

  <div class="hr"></div>

  <div class="btns">
    <button id="btnPlay" onclick="togglePlay()">⏸ Pause</button>
    <button onclick="savePng()">↓ PNG</button>
    <button id="btnRec" onclick="toggleRecord()">⏺ Record</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { preserveDrawingBuffer: true });
if (!gl) {
  document.body.innerHTML = '<p style="color:#fff;padding:40px;font-family:sans-serif">WebGL2 is required.</p>';
}

let playing = true, elapsed = 0, lastTs = null;

function hexToRgb(hex) {
  return [
    parseInt(hex.slice(1,3),16)/255,
    parseInt(hex.slice(3,5),16)/255,
    parseInt(hex.slice(5,7),16)/255
  ];
}

const DPR = Math.min(devicePixelRatio, 2);
canvas.width  = 1280;
canvas.height = 720;
gl.viewport(0, 0, 1280, 720);

function resizeCanvas() {
  const w = Math.round(canvas.clientWidth  * DPR);
  const h = Math.round(canvas.clientHeight * DPR);
  if (w > 0 && h > 0 && (canvas.width !== w || canvas.height !== h)) {
    canvas.width  = w;
    canvas.height = h;
    gl.viewport(0, 0, w, h);
  }
}
new ResizeObserver(resizeCanvas).observe(canvas);
resizeCanvas();

// ---- Shaders ----
const VS = `#version 300 es
in vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
`;

const FS = `#version 300 es
precision highp float;
out vec4 fragColor;

uniform vec2  uRes;
uniform float uTime;
uniform float uScale;
uniform float uWidth;
uniform vec3  uColorA;
uniform vec3  uColorB;

// Hash for a 2D cell coordinate
float hash21(vec2 p) {
  p = fract(p * vec2(127.1, 311.7));
  p += dot(p, p + 19.19);
  return fract(p.x * p.y);
}

// Smooth value noise (bilinear interpolation over hash grid)
float vnoise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash21(i);
  float b = hash21(i + vec2(1.0, 0.0));
  float c = hash21(i + vec2(0.0, 1.0));
  float d = hash21(i + vec2(1.0, 1.0));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

// 3-octave FBM
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 3; i++) {
    v += a * vnoise(p);
    p = p * 2.03 + vec2(3.1, 1.7);
    a *= 0.5;
  }
  return v;
}

void main() {
  vec2 uv = gl_FragCoord.xy / uRes;
  float aspect = uRes.x / uRes.y;

  // Aspect-correct tiling
  vec2 scaled = vec2(uv.x * uScale * aspect, uv.y * uScale);
  vec2 cellUV  = fract(scaled);
  vec2 cellID  = floor(scaled);

  // Time drift for organic evolution of config
  float timeDrift = uTime * 0.12;
  float noiseVal = fbm(cellID / uScale * 3.0 + timeDrift);
  float config = step(0.5, noiseVal);

  // Arc distance for each config:
  // Config 0: arcs from corner (0,0) and corner (1,1)
  // Config 1: arcs from corner (1,0) and corner (0,1)
  float d;
  if (config < 0.5) {
    float d0 = abs(length(cellUV) - 0.5);
    float d1 = abs(length(cellUV - vec2(1.0, 1.0)) - 0.5);
    d = min(d0, d1);
  } else {
    float d0 = abs(length(cellUV - vec2(1.0, 0.0)) - 0.5);
    float d1 = abs(length(cellUV - vec2(0.0, 1.0)) - 0.5);
    d = min(d0, d1);
  }

  // Anti-aliased line width
  float hw = uWidth;
  float px = 1.5 / (uRes.y / uScale);
  float line = smoothstep(hw + px, hw - px, d);

  // Tube specular highlight: bright centre of the tube
  float tube = max(0.0, 1.0 - d / max(hw, px)) * line * 0.3;

  // Glow halo around the line
  float glow = exp(-d * uScale * 1.8) * 0.08;

  // Compose final color
  vec3 col = mix(uColorB, uColorA, line);
  col += uColorA * (tube + glow);

  fragColor = vec4(col, 1.0);
}
`;

function mkShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    console.error('Shader error:', gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, mkShader(gl.VERTEX_SHADER,   VS));
gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
  console.error('Link error:', gl.getProgramInfoLog(prog));
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const U = {
  res:    gl.getUniformLocation(prog, 'uRes'),
  time:   gl.getUniformLocation(prog, 'uTime'),
  scale:  gl.getUniformLocation(prog, 'uScale'),
  width:  gl.getUniformLocation(prog, 'uWidth'),
  colorA: gl.getUniformLocation(prog, 'uColorA'),
  colorB: gl.getUniformLocation(prog, 'uColorB'),
};

function frame(ts) {
  if (lastTs !== null && playing) elapsed += (ts - lastTs) / 1000;
  lastTs = ts;

  const ca = hexToRgb(document.getElementById('cA').value);
  const cb = hexToRgb(document.getElementById('cB').value);
  const scale = parseFloat(document.getElementById('sScale').value);
  const thick = parseFloat(document.getElementById('sThick').value);
  const speed = parseFloat(document.getElementById('sSpeed').value);

  gl.uniform2f(U.res,   canvas.width, canvas.height);
  gl.uniform1f(U.time,  elapsed * speed);
  gl.uniform1f(U.scale, scale);
  gl.uniform1f(U.width, thick * 0.008);
  gl.uniform3f(U.colorA, ca[0], ca[1], ca[2]);
  gl.uniform3f(U.colorB, cb[0], cb[1], cb[2]);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ---- Controls ----
[
  ['sScale', 'vScale', 0],
  ['sThick', 'vThick', 0],
  ['sSpeed', 'vSpeed', 2],
].forEach(([sid, vid, dp]) => {
  document.getElementById(sid).addEventListener('input', () => {
    document.getElementById(vid).textContent =
      parseFloat(document.getElementById(sid).value).toFixed(dp);
  });
});

function togglePlay() {
  playing = !playing;
  if (playing) lastTs = null;
  document.getElementById('btnPlay').textContent = playing ? '⏸ Pause' : '▶ Play';
}

function savePng() {
  const a = document.createElement('a');
  a.download = 'truchet-tiles.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

let mediaRecorder2 = null, recordChunks2 = [];
function toggleRecord() {
  const btn = document.getElementById('btnRec');
  if (!mediaRecorder2) {
    const mimeType = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm']
      .find(m => MediaRecorder.isTypeSupported(m));
    const stream = canvas.captureStream(30);
    mediaRecorder2 = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8_000_000 });
    recordChunks2 = [];
    mediaRecorder2.ondataavailable = e => { if (e.data.size > 0) recordChunks2.push(e.data); };
    mediaRecorder2.onstop = () => {
      const blob = new Blob(recordChunks2, { type: mimeType });
      const a = document.createElement('a');
      a.download = 'truchet-tiles.webm';
      a.href = URL.createObjectURL(blob);
      a.click();
      URL.revokeObjectURL(a.href);
      mediaRecorder2 = null;
    };
    mediaRecorder2.start();
    btn.textContent = '⏹ Stop';
    btn.classList.add('rec');
    if (!playing) togglePlay();
  } else {
    mediaRecorder2.stop();
    btn.textContent = '⏺ Record';
    btn.classList.remove('rec');
  }
}
</script>

</body>
</html>
