<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bubble Background Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    gap: 16px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
  }
  canvas {
    max-width: 100%;
    border-radius: 10px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.5);
  }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }
  button {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    background: #007AFF;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.1s;
  }
  button:hover { background: #0066dd; }
  button.ghost { background: #2c2c2e; color: #ccc; }
  button.ghost:hover { background: #3a3a3c; }
  button.on { background: #30d158; color: #000; }
  button.on:hover { background: #28b84c; }
  button.rec { background: #ff3b30; color: #fff; }
  button.rec:hover { background: #d93226; }

  .seg {
    display: flex;
    background: #2c2c2e;
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
  }
  .seg button {
    background: transparent;
    color: #666;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    transition: background 0.1s, color 0.1s;
  }
  .seg button.on { background: #48484a; color: #fff; }

  .opt-group { display: flex; align-items: center; gap: 12px; }
  .opt-item {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #777;
    font-size: 12px;
  }
  .opt-item span.val { color: #aaa; font-size: 12px; min-width: 32px; text-align: right; }
  input[type="color"] {
    -webkit-appearance: none;
    width: 28px; height: 28px;
    border: none; border-radius: 6px;
    cursor: pointer; padding: 0; background: none;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border-radius: 5px; border: 2px solid #444; }
  input[type="range"] { width: 80px; accent-color: #007AFF; cursor: pointer; }
  .divider { width: 1px; height: 26px; background: #2e2e2e; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="controls">
  <button onclick="generate()">Regenerate</button>
  <button id="btn-anim" class="ghost" onclick="toggleAnim()">Animate</button>

  <div class="opt-item" id="speedOpt" style="display:none">
    Speed
    <input type="range" id="animSpeed" min="10" max="300" value="60"
           oninput="document.getElementById('speedVal').textContent=this.value+'px/s'">
    <span class="val" id="speedVal">60px/s</span>
  </div>

  <div class="divider"></div>

  <div class="seg">
    <button id="btn-fill" class="on" onclick="setMode('fill')">Fill</button>
    <button id="btn-outline" onclick="setMode('outline')">Outline</button>
    <button id="btn-glass" onclick="setMode('glass')">Glass</button>
  </div>

  <!-- Fill options -->
  <div class="opt-group" id="fillOpts">
    <div class="opt-item">
      Color
      <input type="color" id="fillColor" value="#87B3FF" oninput="recolor()">
    </div>
    <div class="opt-item">
      Opacity
      <input type="range" id="fillOpacity" min="1" max="100" value="17"
             oninput="syncLabel('fillOpacity','fillOpVal');recolor()">
      <span class="val" id="fillOpVal">17%</span>
    </div>
  </div>

  <!-- Outline options -->
  <div class="opt-group" id="outlineOpts" style="display:none">
    <div class="opt-item">
      Color
      <input type="color" id="strokeColor" value="#87B3FF" oninput="staticRender()">
    </div>
    <div class="opt-item">
      Opacity
      <input type="range" id="strokeOpacity" min="1" max="100" value="60"
             oninput="syncLabel('strokeOpacity','strokeOpVal');staticRender()">
      <span class="val" id="strokeOpVal">60%</span>
    </div>
    <div class="opt-item">
      Width
      <input type="range" id="strokeWidth" min="0.5" max="6" step="0.5" value="1.5"
             oninput="syncLabel('strokeWidth','strokeWVal',false);staticRender()">
      <span class="val" id="strokeWVal">1.5px</span>
    </div>
  </div>

  <div class="divider"></div>

  <button class="ghost" onclick="savePNG()">Save PNG</button>
  <button class="ghost" onclick="savePNG2x()">Save @2x</button>
  <button id="btn-rec" class="ghost" onclick="toggleRecord()">Save Video</button>
  <div class="opt-item" id="recOpts">
    <input type="range" id="recDuration" min="3" max="30" step="1" value="5"
           oninput="document.getElementById('recDurVal').textContent=this.value+'s'">
    <span class="val" id="recDurVal">5s</span>
  </div>
</div>

<script>
// ── Canvas ────────────────────────────────────────────────────────
const W = 1920, H = 1080;
const canvas = document.getElementById('c');
canvas.width = W; canvas.height = H;
canvas.style.maxWidth = '100%';
const ctx = canvas.getContext('2d');

// ── Config ────────────────────────────────────────────────────────
const BH     = 62;
const MIN_BW = BH * 1.8;
const MAX_BW = BH * 6.8;
const H_GAP  = 11;
const BG     = '#ffffff';
const TAIL_H = BH * 0.165;
const ROW_H  = BH + TAIL_H + 22;

// ── App state ─────────────────────────────────────────────────────
let mode       = 'fill';
let activeSeed = Date.now();
let rowData    = []; // [{tailLeft, by, bubbles:[{x,bw,color}], tileWidth, rowPhase}]

// ── Animation state ───────────────────────────────────────────────
let animating     = false;
let animOffset    = 0;   // px, grows monotonically
let lastFrameTime = null;
let rafId         = null;

// ── LCG seeded random ─────────────────────────────────────────────
let seed = 1;
function rnd() {
  seed = (Math.imul(seed, 1664525) + 1013904223) | 0;
  return (seed >>> 0) / 0xFFFFFFFF;
}
function rndRange(lo, hi) { return lo + rnd() * (hi - lo); }
function rndInt(n)         { return Math.floor(rnd() * n); }

// ── Bubble path constants ─────────────────────────────────────────
// Derived from tailwithbubble.svg (W=1316 H=315 r=157.5).
// All normalized by H, relative to right arc center.
const K = 0.5523;
const ARC_R_Q2 = {
  cp1: { x: 0.5000, y: 0.1688 }, cp2: { x: 0.4162, y: 0.3185 }, end: { x: 0.2877, y: 0.4089 },
};
const TC1 = { cp1:{x:0.2675,y:0.4259}, cp2:{x:0.2206,y:0.4706}, end:{x:0.2206,y:0.5190} };
const TC2 = { cp1:{x:0.2206,y:0.5808}, cp2:{x:0.2937,y:0.6532}, end:{x:0.2937,y:0.6651} };
const TC3 = { cp1:{x:0.2937,y:0.7059}, cp2:{x:0.0520,y:0.6179}, end:{x:-0.0364,y:0.5000} };

// ── Path builder ──────────────────────────────────────────────────
function buildPath(tctx, bx, by, bw, bh) {
  const r = bh / 2, S = bh;
  const lcx = bx + r,       lcy = by + r;
  const acx = bx + bw - r,  acy = by + r;
  const a = p => [acx + p.x * S, acy + p.y * S];

  tctx.beginPath();
  tctx.moveTo(...a(TC3.end));
  tctx.lineTo(lcx, lcy + r);
  tctx.bezierCurveTo(lcx-K*r, lcy+r,   lcx-r, lcy+K*r,  lcx-r, lcy);
  tctx.bezierCurveTo(lcx-r,   lcy-K*r, lcx-K*r, lcy-r,  lcx,   lcy-r);
  tctx.lineTo(acx, by);
  tctx.bezierCurveTo(acx+K*r, acy-r,   acx+r, acy-K*r,  acx+r, acy);
  tctx.bezierCurveTo(
    acx + ARC_R_Q2.cp1.x*S, acy + ARC_R_Q2.cp1.y*S,
    acx + ARC_R_Q2.cp2.x*S, acy + ARC_R_Q2.cp2.y*S,
    acx + ARC_R_Q2.end.x*S, acy + ARC_R_Q2.end.y*S
  );
  tctx.bezierCurveTo(...a(TC1.cp1), ...a(TC1.cp2), ...a(TC1.end));
  tctx.bezierCurveTo(...a(TC2.cp1), ...a(TC2.cp2), ...a(TC2.end));
  tctx.bezierCurveTo(...a(TC3.cp1), ...a(TC3.cp2), ...a(TC3.end));
  tctx.closePath();
}

// ── Liquid glass bubble renderer ──────────────────────────────────
// Layers: tint base → top specular sweep → radial glint → bright edge stroke → bottom darkening
function drawGlassBubble(tctx, bx, by, bw, bh, color) {
  const r = bh / 2;

  // 1. Base tint + drop shadow
  tctx.save();
  tctx.shadowColor    = 'rgba(0,0,0,0.18)';
  tctx.shadowBlur     = 14;
  tctx.shadowOffsetY  = 3;
  buildPath(tctx, bx, by, bw, bh);
  tctx.fillStyle = color;
  tctx.fill();
  tctx.restore();

  // 2. Specular + glint layers clipped to bubble shape
  tctx.save();
  buildPath(tctx, bx, by, bw, bh);
  tctx.clip();

  // Top specular sweep — strong white at top, fades out by 70% down
  const spec = tctx.createLinearGradient(0, by, 0, by + bh * 0.72);
  spec.addColorStop(0,    'rgba(255,255,255,0.58)');
  spec.addColorStop(0.28, 'rgba(255,255,255,0.22)');
  spec.addColorStop(0.60, 'rgba(255,255,255,0.05)');
  spec.addColorStop(1,    'rgba(255,255,255,0)');
  tctx.fillStyle = spec;
  tctx.fillRect(bx - r, by, bw + r * 2, bh);

  // Radial glint — small hot spot at top-left cap, like a point light on curved glass
  const gx = bx + r * 1.4, gy = by + r * 0.5;
  const glint = tctx.createRadialGradient(gx, gy, 0, gx, gy, r * 1.2);
  glint.addColorStop(0,    'rgba(255,255,255,0.42)');
  glint.addColorStop(0.38, 'rgba(255,255,255,0.10)');
  glint.addColorStop(1,    'rgba(255,255,255,0)');
  tctx.fillStyle = glint;
  tctx.fillRect(bx, by, bw, bh);

  // Subtle bottom darkening — gives the sense of glass thickness
  const floor = tctx.createLinearGradient(0, by + bh * 0.58, 0, by + bh);
  floor.addColorStop(0, 'rgba(0,0,0,0)');
  floor.addColorStop(1, 'rgba(0,0,0,0.09)');
  tctx.fillStyle = floor;
  tctx.fillRect(bx - r, by, bw + r * 2, bh);

  tctx.restore();

  // 3. Bright edge stroke — the glass rim
  buildPath(tctx, bx, by, bw, bh);
  tctx.strokeStyle = 'rgba(255,255,255,0.68)';
  tctx.lineWidth   = 1.4;
  tctx.stroke();
}

// ── Draw one bubble ───────────────────────────────────────────────
function drawBubble(tctx, bx, by, bw, bh, color, tailLeft) {
  tctx.save();
  if (tailLeft) { tctx.translate(bx + bw, 0); tctx.scale(-1, 1); bx = 0; }

  if (mode === 'glass') {
    drawGlassBubble(tctx, bx, by, bw, bh, color);
  } else if (mode === 'outline') {
    buildPath(tctx, bx, by, bw, bh);
    const [r,g,b] = hexToRgb(document.getElementById('strokeColor').value);
    const a = parseFloat(document.getElementById('strokeOpacity').value) / 100;
    tctx.strokeStyle = `rgba(${r},${g},${b},${a.toFixed(3)})`;
    tctx.lineWidth   = parseFloat(document.getElementById('strokeWidth').value);
    tctx.stroke();
  } else {
    buildPath(tctx, bx, by, bw, bh);
    tctx.fillStyle = color;
    tctx.fill();
  }

  tctx.restore();
}

// ── Color helpers ─────────────────────────────────────────────────
function hexToRgb(hex) {
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function pickFillColor() {
  const [r,g,b] = hexToRgb(document.getElementById('fillColor').value);
  const baseA = parseFloat(document.getElementById('fillOpacity').value) / 100;
  const v = (c, d) => Math.min(255, Math.max(0, c + Math.round(rndRange(-d, d))));
  const a = Math.min(1, Math.max(0.01, baseA * rndRange(0.75, 1.25)));
  return `rgba(${v(r,14)},${v(g,14)},${v(b,14)},${a.toFixed(3)})`;
}

// ── Layout pre-computation ────────────────────────────────────────
// Run once per new seed or color change.
// Bubbles start at x=0 and extend to tileWidth — the seamless loop period.
// rowPhase offsets each row randomly so they don't all start at the same place.
function computeLayout() {
  seed = activeSeed;
  rowData = [];
  const numRows = Math.ceil(H / ROW_H) + 2;

  for (let row = 0; row < numRows; row++) {
    const tailLeft = row % 2 === 1;
    const by = row * ROW_H + rndRange(-4, 4);
    const bubbles = [];
    let x = 0;

    // Generate bubbles until we have enough to tile the canvas with room to spare.
    // tileWidth = accumulated x after all bubbles = the seamless loop period.
    while (x < W * 1.5 + MAX_BW) {
      const bw    = rndRange(MIN_BW, MAX_BW);
      const color = pickFillColor();
      bubbles.push({ x, bw, color });
      x += bw + H_GAP;
    }

    const tileWidth = x; // next bubble would start here — this is the loop period
    const rowPhase  = Math.floor(rndRange(0, tileWidth)); // seeded per-row visual stagger

    rowData.push({ tailLeft, by, bubbles, tileWidth, rowPhase });
  }
}

// ── Draw one row with tile offset ─────────────────────────────────
// offset: global animation offset in px (monotonically increasing)
// dir: +1 = row drifts right, -1 = drifts left
function drawRow(tctx, row, offset) {
  const { tailLeft, by, bubbles, tileWidth, rowPhase } = row;
  const dir      = tailLeft ? 1 : -1;  // left-tail rows move right, right-tail move left
  const totalOff = rowPhase + dir * offset;
  // Normalise into [0, tileWidth) so offset wraps cleanly
  const normOff  = ((totalOff % tileWidth) + tileWidth) % tileWidth;

  for (const b of bubbles) {
    // Try three tile copies — handles bubbles near the loop boundary
    for (const shift of [0, -tileWidth, tileWidth]) {
      const bx = b.x + normOff + shift;
      if (bx > W + BH || bx + b.bw < -BH) continue;
      drawBubble(tctx, bx, by, b.bw, BH, b.color, tailLeft);
    }
  }
}

// ── Render frame ──────────────────────────────────────────────────
function renderFrame(tctx, cw, ch, offset) {
  const sx = cw / W, sy = ch / H;
  tctx.save();
  tctx.fillStyle = BG;
  tctx.fillRect(0, 0, cw, ch);
  tctx.scale(sx, sy);
  for (const row of rowData) drawRow(tctx, row, offset);
  tctx.restore();
}

// ── Static render (no animation, uses current animOffset) ─────────
function staticRender() {
  if (!animating) renderFrame(ctx, W, H, animOffset);
}

// ── Recolor: recompute layout with same seed (updates colors) ──────
function recolor() {
  computeLayout();
  staticRender();
}

// ── Generate: new seed → full recompute ───────────────────────────
function generate() {
  activeSeed = Date.now() ^ (Math.random() * 0x100000000);
  animOffset = 0;
  computeLayout();
  if (!animating) renderFrame(ctx, W, H, 0);
}

// ── Animation RAF loop ────────────────────────────────────────────
function animFrame(ts) {
  if (!lastFrameTime) lastFrameTime = ts;
  const dt = (ts - lastFrameTime) / 1000; // seconds
  lastFrameTime = ts;

  const speed = parseFloat(document.getElementById('animSpeed').value);
  animOffset += speed * dt;

  renderFrame(ctx, W, H, animOffset);
  if (animating) rafId = requestAnimationFrame(animFrame);
}

function toggleAnim() {
  if (animating) {
    animating = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    lastFrameTime = null;
    document.getElementById('btn-anim').className = 'ghost';
    document.getElementById('btn-anim').textContent = 'Animate';
    document.getElementById('speedOpt').style.display = 'none';
    renderFrame(ctx, W, H, animOffset); // freeze at current frame
  } else {
    animating = true;
    lastFrameTime = null;
    document.getElementById('btn-anim').className = 'on';
    document.getElementById('btn-anim').textContent = 'Stop';
    document.getElementById('speedOpt').style.display = 'flex';
    rafId = requestAnimationFrame(animFrame);
  }
}

// ── Mode toggle ───────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btn-fill').classList.toggle('on',    m === 'fill');
  document.getElementById('btn-outline').classList.toggle('on', m === 'outline');
  document.getElementById('btn-glass').classList.toggle('on',   m === 'glass');
  // glass reuses fill color/opacity as the tint
  document.getElementById('fillOpts').style.display    = (m === 'fill' || m === 'glass') ? 'flex' : 'none';
  document.getElementById('outlineOpts').style.display = m === 'outline' ? 'flex' : 'none';
  staticRender();
}

// ── Slider label sync ─────────────────────────────────────────────
function syncLabel(inputId, labelId, isPercent = true) {
  const val = document.getElementById(inputId).value;
  document.getElementById(labelId).textContent = isPercent ? val + '%' : val + 'px';
}

// ── Export ────────────────────────────────────────────────────────
function savePNG() {
  const a = document.createElement('a');
  a.download = 'bubble-bg.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
function savePNG2x() {
  const c2 = document.createElement('canvas');
  c2.width = W * 2; c2.height = H * 2;
  renderFrame(c2.getContext('2d'), W * 2, H * 2, animOffset);
  const a = document.createElement('a');
  a.download = 'bubble-bg@2x.png';
  a.href = c2.toDataURL('image/png');
  a.click();
}

// ── Video recording ───────────────────────────────────────────────
let recording      = false;
let mediaRecorder  = null;
let recTimer       = null;

function toggleRecord() {
  if (recording) {
    // Manual stop
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    return;
  }

  const duration = parseFloat(document.getElementById('recDuration').value) * 1000;

  // Pick best supported format
  const mimeType = [
    'video/webm;codecs=vp9',
    'video/webm;codecs=vp8',
    'video/webm',
  ].find(t => MediaRecorder.isTypeSupported(t));

  if (!mimeType) {
    alert('MediaRecorder is not supported in this browser.');
    return;
  }

  // Auto-start animation if it isn't running
  const autoStarted = !animating;
  if (autoStarted) toggleAnim();

  const stream   = canvas.captureStream(60);
  mediaRecorder  = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 8_000_000 });
  const chunks   = [];

  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

  mediaRecorder.onstop = () => {
    recording = false;
    clearInterval(recTimer);
    document.getElementById('btn-rec').className  = 'ghost';
    document.getElementById('btn-rec').textContent = 'Save Video';
    document.getElementById('recDuration').disabled = false;

    const blob = new Blob(chunks, { type: 'video/webm' });
    const a    = document.createElement('a');
    a.download = 'bubble-bg.webm';
    a.href     = URL.createObjectURL(blob);
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 60000);

    if (autoStarted) toggleAnim(); // restore prior state
  };

  recording = true;
  mediaRecorder.start(100); // collect in 100ms chunks
  document.getElementById('recDuration').disabled = true;

  // Countdown label
  let remaining = duration / 1000;
  const update  = () => {
    document.getElementById('btn-rec').className  = 'rec';
    document.getElementById('btn-rec').textContent = `Stop (${remaining.toFixed(1)}s)`;
  };
  update();
  recTimer = setInterval(() => {
    remaining -= 0.1;
    if (remaining <= 0) {
      clearInterval(recTimer);
      if (mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    } else {
      update();
    }
  }, 100);
}

// ── Init ──────────────────────────────────────────────────────────
generate();
</script>
</body>
</html>
